# Methodology & Legend content for the Risk Taxonomy Transformer output workbook.
# Loaded by export.py and written to multiple methodology tabs.
#
# Each section has an optional `tab:` field controlling which sheet it lands in:
#   tab: "LUminate Methodology"  — visible; per-source scope/attribution/interpretation
#   tab: "Methodology"           — audit-leader-facing one-screen core (default if omitted)
#   tab: "Methodology Detail"    — hidden; deep reference for power users
#   tab: "RCO Methodology"       — hidden; sections for Risk Category Owners
#
# Audit leaders open Methodology by default. Methodology Detail and RCO
# Methodology are hidden by default but can be unhidden by anyone who wants
# the deeper docs.
#
# Section schema:
#   title:  required — the section's heading row (rendered bold).
#   tab:    optional — which workbook tab this section lands in.
#   header: optional — column headers for a 2-column key/value table.
#   rows:   optional — list of [topic, detail] pairs rendered as table rows.
#   body:   optional — multi-paragraph prose. Each paragraph is rendered as a
#                       merged-row block (Excel) or a <p>/<ul>/<li> block (HTML).
#                       Lines starting with "- " inside a body block are bulleted.

sections:
  # ============================================================
  # LUminate Methodology (visible) — per-source scope, attribution,
  # interpretation. Mirrors the HTML report sidebar entry of the same
  # name. Long-form prose lives in `body:` (rendered as wrapped cells in
  # Excel and <p>/<ul> blocks in HTML).
  # ============================================================
  - title: "LUminate Methodology"
    tab: "LUminate Methodology"
    body: |-
      How to read this tab: each section below covers one source feeding the report.
      It states what's in scope, where AE and L2 attribution come from, and how to interpret what you see.

  - title: "Universal failure modes"
    tab: "LUminate Methodology"
    body: |-
      Two failure modes apply across all sources unless the source's section calls out a deviation:
      - No AE assigned upstream. When the source system does not link an item to an Audit Entity, LUminate has no way to attach the item to a per-AE view. The item appears in the Upstream Tagging Gaps tab in the Excel workbook so reviewers can see what dropped out and chase the upstream tagging gap with the responsible team. LUminate does not infer linkage that the source system did not establish.
      - L2 doesn't map to the current taxonomy. Items whose L2 attribution falls outside the canonical 24-risk taxonomy land in the Unmapped Findings column on the Audit_Review tab (Excel workbook only — this column is not surfaced in the HTML report). Reviewers can see exactly which items dropped out of their AE's main view.

  - title: "NLP mapping confidence"
    tab: "LUminate Methodology"
    body: |-
      The NLP mappers (ORE legacy, ORE IRM, PRSA, GRA RAPs) score source items against the canonical L2 taxonomy text, including L3 and L4 definitions where present. When the bulk of items land in "Needs Review" rather than "Suggested Match", it means the L2 definitions are not textually differentiated enough to give the mapper confident matches. This reflects how similar the L2 definitions are written, not a LUminate flaw. LUminate cannot rewrite the taxonomy — the definitions are upstream artifacts owned by the enterprise taxonomy. The mapper compares against the text it has.

  - title: "Findings"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces IAG audit findings approved at L1/L2 review. Approved closed findings appear for traceability but do not drive Impact of Issues or contradiction flags. Drafts and in-review findings are excluded entirely — they do not confirm L2 applicability.
      Attribution. Findings are attributed to AEs and L2 risks via the finding's own Audit Entity and Risk Dimension Categories fields in IAG. Standard failure modes apply (see top of tab).
      Interpretation. Issue confirmation is a signal, not a determination. An open finding confirms that an L2 is applicable to an AE; it does not set the rating.

  - title: "OREs (legacy)"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces operational risk events from the legacy ORE source, attributed to AEs and L2 risks. Closed and canceled events are excluded; only active events appear in this tab.
      Attribution. AE attribution comes from the ORE source's own AE field — LUminate does not infer linkage. L2 attribution is inferred from event title and description text using NLP similarity against the canonical L2 taxonomy. Standard failure modes apply (see top of tab).
      Interpretation. ORE-to-L2 attribution is inferred from event text, not Audit / Management provided. Reviewers can confirm or adjust the mapping during assessment.

  - title: "ORE IRM"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces operational risk events from the IRM Archer system. All IRM OREs are shown — Capture Status reflects workflow entry only, not resolution, so closed-status filtering is not applied at this layer. Reviewers should confirm an event's open/closed status in IRM before relying on it as Impact of Issues evidence.
      Attribution. AE attribution comes from the IRM ORE ID column on each AE's row in Source - Legacy Data — the audit team explicitly lists the IRM OREs relevant to each AE. L2 attribution prefers the source's Risk Level 2 field when populated and maps to the current taxonomy; otherwise NLP similarity scoring fills the gap. Provenance is surfaced in the L2 Source column.
      Source-specific failure mode (in addition to standard, see top of tab):
      - An IRM ORE not listed in any AE's IRM ORE ID cell on Source - Legacy Data is invisible to the report — even if it exists in the IRM source file. The bridge is the entire attribution path; there is no AE column on the IRM source itself. These items will surface in the Upstream Tagging Gaps tab.
      Interpretation. When the source's Risk Level 2 field is populated and maps to the current taxonomy, the L2 is treated as Audit / Management provided. When the mapper supplies the L2 (fallback), the attribution is inferred from event text.

  - title: "PRSA Issues"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces active PRSA issues from IRM Archer. Closed issues are excluded. Issues flagged with #PG or PG at the start of the description are split out to the Source - PG Gaps tab in the Excel workbook (in the HTML report, surfaced as the per-AE PG Gaps section). Issues without a PRSA control mapping (e.g., RCSA-only issues) do not appear here unless PG-flagged. PRSAs tagged to an AE in legacy but with no issues in Archer do not generate rows here — the full PRSA list per AE is preserved in the All PRSAs Tagged to AE column for traceability.
      Attribution. AE attribution flows through PRSA: the audit team enters which PRSAs apply to each AE in Source - Legacy Data, and issues attach to those AEs through the PRSAs that hold them. L2 attribution prefers the source's Risk Level 2 field when populated and maps to the current taxonomy; otherwise NLP similarity scoring fills the gap. Provenance is surfaced in the L2 Source column. Standard failure modes apply (see top of tab).
      Interpretation. When the source's Risk Level 2 field is populated and maps to the current taxonomy, the L2 is treated as Audit / Management provided. When the mapper supplies the L2 (fallback), the attribution is inferred from issue text. PRSAs tagged to an AE but with no issues do not appear in this tab — reviewers should reference All PRSAs Tagged to AE on each row for the full PRSA coverage list.

  - title: "PG Gaps"
    tab: "LUminate Methodology"
    body: |-
      Scope. This tab surfaces issues flagged with #PG or PG at the start of the Issue Description in IRM Archer. Issues are split between this tab and the standard PRSA Issues view based on their PG flag — PG-flagged issues come here, non-PG issues stay on the PRSA tab, and no issue appears in both lists.
      Attribution. AE attribution flows through the same PRSA-based path as standard PRSA issues — the audit team enters which PRSAs apply to each AE in Source - Legacy Data, and PG-flagged issues attach to AEs through the PRSAs that hold them. PG-flagged issues with no PRSA control cannot be attributed to an AE; they remain visible here so the responsible team can identify and add the missing controls upstream. Standard failure modes apply (see top of tab).
      Interpretation. The PG flag is independent of mapper output — it marks an issue as Project Guardian-related and does not determine L2 applicability or rating. PG flag detection is case-sensitive on the Issue Description prefix. Reviewers should treat unmapped PG issues as upstream tagging gaps in IRM Archer rather than as evidence to attribute to a specific AE.

  - title: "GRA RAPs"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces regulatory findings (RAPs) from GRA, attributed to AEs and L2 risks. All RAPs are shown, including closed ones — RAP Status is not used today to filter findings out. Reviewers should consult RAP Status directly when evaluating whether a finding is active.
      Attribution. AE attribution comes from the source's own Audit Entity field — LUminate does not infer linkage. L2 attribution is inferred from RAP header and details text using NLP similarity scoring against the canonical L2 taxonomy. Standard failure modes apply (see top of tab).
      Interpretation. RAP-to-L2 attribution is inferred from RAP text, not Audit / Management provided. Reviewers can confirm or adjust the mapping during assessment.

  - title: "BM Activities"
    tab: "LUminate Methodology"
    body: |-
      Scope. This source surfaces Business Monitoring Activity cases that the audit team has flagged as requiring an Audit Entity Risk Assessment (AERA) update — specifically, cases where the activity had an AERA-relevant impact and the recommended action is "AERA Update". This filter is applied at the Archer report level before the file reaches LUminate; LUminate trusts the upstream filter and does not re-validate it. On top of it, LUminate applies a date cutoff: cases with a Planned Completion Date before July 1, 2025 are filtered out as out-of-scope for the current AERA cycle (cutoff is configurable). Cases without a planned completion date are retained defensively rather than dropped.
      Attribution. AE attribution comes from the source's own Related Audit Entity field. Unlike other signal sources, LUminate does not programmatically attribute BMA cases to L2 risks — the audit team makes that determination per their judgment.
      Failure modes (BMA differs from the standard pattern):
      - BMA cases with a blank AE are retained rather than dropped. They surface in the Upstream Tagging Gaps tab so the responsible team can chase down the missing AE attribution.
      - The "L2 doesn't map" failure mode does not apply — BMAs have no L2 attribution to begin with.
      Interpretation. BMA cases are reference-only signals — they appear alongside L2-attributed sources in per-AE views but do not contribute to applicability scoring or rating logic. Reviewers should weigh BMA cases as supplementary context.

  - title: "Key Risks"
    tab: "LUminate Methodology"
    body: |-
      Scope. Reference data for the audit team's pre-defined key risks (sub-risks) per AE, including which apps and third parties are tagged as "key" for each risk.
      Use. Drives applicability suggestion flags — when a key app or key third party is tagged to an AE, the associated risk dimensions are surfaced as suggestions for review. Also populates the Key Apps / Key TPs columns in Key_Inventory. Key risks themselves do not drive ratings; they are inputs to the suggestion layer.

  - title: "L2 Taxonomy"
    tab: "LUminate Methodology"
    body: |-
      Scope. The 24 evaluated L2 risks plus their definitions, names, and L1 groupings. Loaded from the audit team's taxonomy file.
      Use. Provides canonical L2 names (what every other source maps against), reference text for the NLP mappers (ORE / PRSA / RAP), and the validation rule for whether source-tagged L2 fields map to the current taxonomy. Three L1 categories — Reputation, Country, Strategic-Earning — are intentionally excluded from this evaluated set.

  - title: "Models"
    tab: "LUminate Methodology"
    body: |-
      Scope. Models from the model inventory file that are referenced in the legacy Models (View Only) column on at least one AE row. Models in the inventory but not tagged to any AE are filtered out to keep per-AE drill-downs focused.
      Use. Reference for per-AE Models drill-down in the HTML report. Model presence on an AE drives a signal flag (model_flag) that suggests L2 applicability for risk dimensions where models matter (Model Risk in particular). Reviewers decide whether the suggestion is correct.

  - title: "Legacy Data"
    tab: "LUminate Methodology"
    body: |-
      Scope. The audit team's current-state input data per AE — legacy taxonomy ratings, control assessments, rationale, applications/third parties/models/mandates tagged to each AE, PRSA-to-AE mappings, IRM ORE IDs, and supplementary risk dimensions.
      Use. Foundational dataset that drives:
      - The PRSA-to-AE bridge (how PRSA issues attribute to AEs)
      - The IRM ORE ID bridge (how IRM Archer OREs attribute to AEs)
      - Inventory chip rendering (apps, third parties, models, policies, mandates)
      - Applicability suggestions via auxiliary / core risk dimensions and Additional Signals
      Caveats.
      - Rating carryforward only on 1:1 direct mappings. Where a legacy pillar maps to multiple new L2s, no rating carries forward — reviewers must rate from scratch.
      - PRSA tagging on AEs is not validated. If a PRSA listed in the legacy PRSA column doesn't actually exist in PRSA Archer, LUminate has no way to detect that.
      - Inventory and signals drive suggestions, not determinations. Apps / third parties / models / mandates presence flags applicability for reviewer judgment; the audit team decides.

  # ============================================================
  # Methodology (visible) — one-screen core
  # ============================================================
  - title: "LUminate — Methodology & Legend"
    tab: "Methodology"
    rows: []

  - title: "PURPOSE"
    tab: "Methodology"
    rows:
      - ["This workbook maps legacy 14-pillar risk assessments to the new 23 L2 risk taxonomy.", ""]
      - ["For each audit entity, the tool proposes which L2 risks are applicable and carries", ""]
      - ["forward inherent risk ratings and control assessments as a starting point for teams.", ""]

  - title: "STATUS VALUES"
    tab: "Methodology"
    header: ["Status", "Meaning"]
    rows:
      - ["Applicable", "Evidence confirms this L2 risk applies to the entity. Sources include keyword matches in rationale text, key risk descriptions, and open findings."]
      - ["Applicability Undetermined", "Could not determine applicability from available data. All candidate L2s from the legacy pillar are populated with the legacy rating. Team must decide which apply and mark the rest N/A."]
      - ["Assumed N/A — Verify", "Other L2s from the same legacy pillar had keyword evidence, but this one did not. The Decision Basis column names which sibling L2s matched. No evidence was found for this L2 — verify whether it applies to this entity."]
      - ["Not Applicable", "The legacy pillar was explicitly rated Not Applicable. Carried forward with high confidence."]
      - ["No Legacy Source", "No legacy pillar maps to this L2 risk. This is a structural gap in the crosswalk, not a team decision."]

  - title: "WHAT THE TOOL DOES NOT DO"
    tab: "Methodology"
    rows:
      - ["The tool does NOT compute final risk ratings. Proposed Rating is populated only for direct 1:1", ""]
      - ["pillar-to-L2 mappings; for all other rows, the reviewer assigns a rating using their judgment.", ""]
      - ["The tool does NOT compute final control ratings. It assembles the inputs (last audit baseline,", ""]
      - ["open findings/OREs/PRSAs/BMA cases) and presents them so the reviewer can make the call.", ""]
      - ["The tool does NOT confirm applicability based on AI review or keyword matching alone — those", ""]
      - ["are advisory signals. Open findings tagged to an L2 are the only auto-confirming evidence.", ""]

  - title: "TABS IN THIS WORKBOOK"
    tab: "Methodology"
    header: ["Tab", "Purpose"]
    rows:
      - ["Methodology", "This tab — explains the tool's approach, status values, and column definitions."]
      - ["Dashboard", "Tool proposals summary — what the tool proposed and what needs judgment."]
      - ["Audit_Review", "All entity-L2 rows with proposed statuses, ratings, and decision basis. Primary workspace."]
      - ["Legacy Ratings Lookup", "Filter by Entity ID to see all legacy pillar ratings, rationales, and control assessments for that entity. Reference tab — ratings are not carried forward except for direct 1:1 mappings."]
      - ["Source - Legacy Data", "Unmodified legacy risk data as ingested (hidden — unhide if needed)."]
      - ["Source - Findings", "All findings with Mapping Status and L2 mapping (hidden — unhide if needed)."]
      - ["Source - Key Risks", "All key risk descriptions with keyword contributions (hidden — unhide if needed)."]
      - ["Source - OREs", "Operational Risk Events mapped to L2 risks by the ORE mapper (hidden — unhide if needed)."]

  # ============================================================
  # Methodology Detail (hidden) — deep reference
  # ============================================================
  - title: "CONFIDENCE LEVELS"
    tab: "Methodology Detail"
    header: ["Level", "Meaning"]
    rows:
      - ["high", "3+ keyword matches from rationale/key risks, or direct 1:1 mapping, or legacy source explicitly N/A, or confirmed by open finding."]
      - ["medium", "1-2 keyword matches. Likely correct but should be verified."]
      - ["low", "Zero keyword matches. All candidates populated for team review."]
      - ["none", "L2 was evaluated as a candidate but had no evidence (Assumed N/A — Verify rows)."]

  - title: "EVIDENCE SOURCES (in priority order)"
    tab: "Methodology Detail"
    header: ["Source", "How it's used"]
    rows:
      - ["Open Findings", "If an approved finding with severity is tagged to an L2 risk for this entity, that L2 is confirmed applicable regardless of keyword matching."]
      - ["Key Risk Descriptions", "Key Risk Descriptions tagged to the entity's legacy pillar are scored against L2 keyword lists. Evidence trail shows key risk ID and matched keywords."]
      - ["Pillar Rationale Text", "Inherent Risk Rationale text from the legacy assessment is scored against L2 keyword lists. Evidence trail shows matched keywords."]
      - ["Application/Engagement Tags", "If IT applications or third party engagements are tagged to the entity, Technology, Data, Information and Cyber Security, and/or Third Party are flagged in Additional Signals."]
      - ["Auxiliary Risk Dimensions", "If L2 risks appear in the entity's AXP or AENB Auxiliary Risk Dimensions columns, they are flagged in Additional Signals."]

  - title: "ADDITIONAL SIGNALS COLUMN"
    tab: "Methodology Detail"
    header: ["Signal", "Meaning"]
    rows:
      - ["Control Flag", "A control contradiction was detected — e.g., the control is rated Well Controlled but there is an open High or Critical finding for this L2."]
      - ["Application / Engagement Flag", "IT applications or third party engagements are tagged to this entity. Distinguishes primary (tested here) vs secondary (used but tested elsewhere)."]
      - ["Auxiliary Risk Flag", "This L2 was listed as an auxiliary risk in the entity's legacy data."]

  - title: "RATING POLICY"
    tab: "Methodology Detail"
    rows:
      - ["Proposed Rating is only populated for direct 1:1 pillar-to-L2 mappings where the legacy", ""]
      - ["rating clearly applies to the new L2. For all other mappings (multi-target, evidence-based,", ""]
      - ["AI-proposed), the rating is left blank. The legacy rating is preserved in the Source Rating", ""]
      - ["column for reference, but the reviewer must actively assign a rating.", ""]

  - title: "RATING SOURCE COLUMN"
    tab: "Methodology Detail"
    header: ["Value", "Meaning"]
    rows:
      - ["Carried from legacy pillar rating", "Direct 1:1 mapping only. The legacy pillar had a single composite rating (e.g., High). All five inherent risk dimensions are set to this value as a starting point."]
      - ["Parsed from rationale", "Direct 1:1 mapping only. The rationale text contained explicit likelihood and/or impact statements (e.g., 'Likelihood is low, impact is high'). Dimensions are set individually."]

  - title: "CONTROL EFFECTIVENESS ASSESSMENT"
    tab: "Methodology Detail"
    header: ["Column", "Meaning"]
    rows:
      - ["Control Effectiveness Baseline", "The entity's control posture derived from its last audit engagement rating. Maps the engagement rating (Satisfactory, Requires Attention, Needs Improvement, Unsatisfactory) to a control label (Well Controlled, Moderately Controlled, Inadequately Controlled, Poorly Controlled). Shows the last audit completion date and next planned audit date for context. The reviewer interprets these dates based on the entity's audit cycle. This is a starting point — the reviewer determines the final control assessment."]
      - ["Impact of Issues", "An itemized listing of all open items tagged to this entity-L2 combination across multiple data sources: audit findings (with Finding ID, title, severity, and status), OREs (with Event ID and title), and enterprise findings (with Finding ID, title, severity, and status). Each item is listed individually for traceability back to source systems. If no items exist for a source, it says so explicitly. If ALL sources have zero items, shows 'No open items'. This column helps the reviewer assess whether the baseline control effectiveness has been degraded by recent events."]

  - title: "FINDING FILTERS APPLIED"
    tab: "Methodology Detail"
    header: ["Filter", "Rule"]
    rows:
      - ["Approval Status", "Only findings with Finding Approval Status = 'Approved' are included."]
      - ["Blank Severity", "Findings with blank or missing severity are excluded."]
      - ["Active Statuses", "Only Open, In Validation, and In Sustainability findings trigger control contradiction flags. Closed, Cancelled, and Not Started are excluded from contradiction checks."]

  - title: "CROSS-BOUNDARY KEYWORD THRESHOLD"
    tab: "Methodology Detail"
    rows:
      - ["A pillar's rationale must contain at least 2 keyword hits for a given L2", ""]
      - ["before a cross-boundary signal fires (the 'Also — referenced in:' block).", ""]
      - ["Single-hit references are intentionally suppressed to reduce noise from", ""]
      - ["stray mentions and negation phrases. Trade-off: a single legitimate mention", ""]
      - ["of a specific term (e.g., 'GDPR' or 'OFAC') will not surface as a signal.", ""]

  - title: "TOOL-COMPUTED COLUMNS (PRSA SOURCE TAB)"
    tab: "Methodology Detail"
    rows:
      - ["The 'Other AEs With This PRSA' column on the Source - PRSA Issues tab is", ""]
      - ["computed by the tool from the 'All PRSAs Tagged to AE' column. It lists", ""]
      - ["every other audit entity that shares the same PRSA, surfacing cross-AE", ""]
      - ["control-failure visibility. This column does NOT exist in the source PRSA", ""]
      - ["report — it is added during ingestion.", ""]

  - title: "L2 SOURCE COLUMN (PRSA SOURCE TAB)"
    tab: "Methodology Detail"
    header: ["Value", "Meaning"]
    rows:
      - ["IRM Archer", "The L2 was entered directly in the Risk Level 2 field of IRM Archer. This is the authoritative source when populated and matches the current L2 taxonomy."]
      - ["Inferred", "The L2 was inferred by an NLP mapper from the issue title and description. Used when the IRM Archer Risk Level 2 field is blank or its value does not match the current L2 taxonomy. Inferred mappings should be re-validated against the issue text by the audit team."]
      - ["Override rule", "When IRM Archer carries a valid L2, it overrides the NLP mapper's output for that issue."]

  - title: "PG GAP SOURCE"
    tab: "Methodology Detail"
    rows:
      - ["A PG Gap is an issue in IRM Archer whose Issue Description begins with `#PG` or `PG` (case-sensitive, followed by a word boundary).", ""]
      - ["PG gaps render as their own evidence pill in Impact of Issues, alongside any PRSA pill that exists for the same issue. The PG pill does NOT replace the PRSA pill — when an issue is both PG-flagged and has a PRSA control mapping, both pills render. PG flagging is significant enough to elevate independently.", ""]
      - ["A PG-flagged issue WITHOUT a PRSA control mapping has no AE attribution and does not render as a pill anywhere in the Risk Profile drill-down. These issues appear only in the Source - PG Gaps tab and are counted in the PG Gap banner.", ""]
      - ["A PG-flagged issue WITH a PRSA control mapping appears in BOTH the Source - PRSA Issues tab and the Source - PG Gaps tab. This is intentional — the PRSA tab is per (AE × Issue × Control), the PG Gaps tab is per Issue.", ""]

  - title: "ORE IRM SOURCE"
    tab: "Methodology Detail"
    rows:
      - ["The ORE IRM source feeds Operational Risk Events from the IRM Archer system into the same evidence pill as the legacy ORE source. Within each (entity, L2) cell's drill-down, IRM rows are listed first, then legacy events.", ""]
      - ["AE ATTRIBUTION: The IRM source file (ORE_IRM_*.xlsx) does NOT carry an Audit Entity column. The bridge is the new `IRM ORE ID` column on legacy_risk_data — a newline-delimited list of ORE-XXX IDs per AE (same convention as the PRSA `All PRSAs Tagged to AE` column).", ""]
      - ["L2 ATTRIBUTION (Track B): If the IRM ORE has a populated Risk Level 2 that normalizes to a current taxonomy L2, that L2 is used directly (provenance = `IRM Archer`). If Risk Level 2 is blank or doesn't normalize, the NLP mapper output (ore_irm_mapping_*.xlsx) is used instead (provenance = `Inferred`). The L2 Source column on Source - ORE IRM distinguishes them.", ""]
      - ["NO STATUS FILTER: Capture Status (in progress / complete / cancelled) is display-only. IRM OREs are NOT filtered out by status — there is no reliable resolution-state field on this source today. Confirm open status manually before treating any IRM ORE as evidence in Impact of Issues. The Source - ORE IRM tab shows a top-row disclosure to this effect.", ""]
      - ["LEGACY EVENT ID: The IRM file carries a Legacy Event ID column that, when populated, matches the EV-XXX ID of an entry in the legacy ORE file. This column is carried through to the workbook and the per-AE drill-down for traceability. It is NOT used today to programmatically link closed-status from the legacy source onto the IRM record.", ""]

  - title: "DEDUPLICATION"
    tab: "Methodology Detail"
    rows:
      - ["When multiple legacy pillars map to the same L2 for an entity, the tool keeps the", ""]
      - ["row with the higher (more conservative) rating and logs both sources in the Legacy", ""]
      - ["Source column. Findings-confirmed rows take priority over keyword matches.", ""]

  - title: "COMMON QUESTIONS"
    tab: "Methodology Detail"
    header: ["Question", "Answer"]
    rows:
      - ["What if I disagree with the tool?", "Change the Reviewer Status column to your determination and add context in Reviewer Notes. The tool never overwrites your decisions — your Reviewer Status is the final answer."]
      - ["How were keywords chosen?", "Keywords were selected from the official L2 risk definitions and validated against sample rationale text. Risk Category Owners can refine the keyword list in taxonomy_config.yaml."]
      - ["What does 'no evidence' actually mean?", "The tool searched the rationale text and key risk descriptions for specific keywords associated with this L2. No keyword match doesn't mean the L2 definitely doesn't apply — it means the available text didn't contain the terms the tool looks for."]
      - ["Can I add a rating to a 'No Legacy Source' L2?", "Yes. If you determine through your own knowledge that a No Legacy Source L2 is applicable, set Reviewer Status to Confirmed Applicable and enter a rating in Reviewer Rating Override."]

  # ============================================================
  # RCO Methodology (hidden) — for Risk Category Owners
  # ============================================================
  - title: "RISK OWNER REVIEW — COLUMN GUIDE"
    tab: "RCO Methodology"
    header: ["Column", "What It Means"]
    rows:
      - ["Review Priority", "A score from 10-100 indicating how urgently this row needs your attention. 100 = the tool says N/A but other signals disagree (most likely error). 90 = the tool couldn't determine applicability. 80 = marked Applicable but with weak evidence. 50 = Applicable at High or Critical (check for rating consistency). 20 = legacy N/A carried forward, no contradicting signals (lowest urgency). Rows are sorted by this score within each L2, so the most important rows appear first when you filter."]
      - ["Proposed Status", "The tool's applicability determination. Same values as the Audit Review tab. See STATUS VALUES section above for definitions."]
      - ["Proposed Rating", "The inherent risk rating the tool derived from legacy data. May be blank if the tool could not determine a rating."]
      - ["Confidence", "How much evidence the tool had. 'high' = strong match or direct mapping. 'medium' = 1-2 keyword hits. 'low' = no keywords matched, all candidates shown. 'none' = evaluated but no evidence found."]
      - ["Method", "The technical method code the tool used. Experienced users can scan this faster than reading the Decision Basis prose. Common values: 'direct' (1:1 pillar mapping), 'evidence_match' (keyword hits), 'source_not_applicable' (legacy N/A), 'issue_confirmed' (finding tagged to this L2), 'evaluated_no_evidence' (checked but no match), 'no_evidence_all_candidates' (couldn't tell which L2s apply), 'true_gap_fill' (no legacy source)."]
      - ["Keyword Hits", "The specific keywords that matched in the rationale text or key risk descriptions. If this column is empty, the tool had no keyword evidence for this L2."]
      - ["Key Risk IDs", "The Key Risk IDs whose descriptions contained keyword matches. These are references back to the entity's key risk inventory."]
      - ["Finding Reference", "Open findings tagged to this L2 for this entity. Format: finding ID (severity, status). If populated, this is the strongest evidence of applicability."]
      - ["Applicable Siblings", "Other L2 risks under the same L1 category that are confirmed Applicable for this entity, with their ratings. Sorted by rating (highest first). Only shows Applicable siblings — unresolved or N/A siblings are excluded. If an entry shows '✓RCO', that sibling's status was confirmed by another Risk Category Owner in a prior review round."]
      - ["Sibling Alert", "A warning that appears when a sibling L2 (same risk category) is rated High or Critical for this entity, but THIS L2 is marked as not applicable. This is a potential false negative — the entity has significant exposure to a related risk, so this L2 may also apply."]
      - ["Business Line Comparison", "How this entity's rating compares to other entities in the same business line (PGA) for this L2. Shows the most common rating among entities where this L2 is Applicable. Helps identify outliers — if most entities in a business line are rated Medium but this one is High, it may warrant a closer look."]
      - ["RCO Agrees", "YOUR INPUT. After reviewing the row, enter: Yes (you agree with the tool), No (you disagree), or Needs Discussion (you want to discuss with the audit leader)."]
      - ["RCO Recommended Status", "YOUR INPUT. If you disagree, enter your recommendation: Confirmed Applicable, Confirmed Not Applicable, or Escalate."]
      - ["RCO Recommended Rating", "YOUR INPUT. If you recommend Applicable, enter the rating you believe is correct: Low, Medium, High, or Critical."]
      - ["RCO Comment", "YOUR INPUT. Explain your reasoning. This comment will be shared with the audit leader who owns this entity. Be specific: name the business activity that triggers the risk, or explain why the tool's evidence is insufficient."]

  - title: "RISK OWNER REVIEW — HOW TO USE"
    tab: "RCO Methodology"
    header: ["Step", "Action"]
    rows:
      - ["1. Find your L2", "Go to the Risk Owner Summary tab. Find your L2 risk row. Note the counts in the Contradicted N/A and Sibling Alerts columns — these are your highest-priority items."]
      - ["2. Filter the detail tab", "Go to Risk Owner Review tab. Click the filter dropdown on the L2 column and select your L2 risk. The rows are pre-sorted by Review Priority (highest urgency first)."]
      - ["3. Review priority 100 rows first", "These are rows where the tool says N/A but other signals disagree. Read the Entity Overview and signal columns. If the entity's business clearly involves your risk, enter 'No' in RCO Agrees and fill in your recommendation."]
      - ["4. Review priority 90 rows", "These are rows where the tool couldn't decide. Use the Entity Overview and your domain knowledge to determine if this L2 applies."]
      - ["5. Scan applicable rows for consistency", "Filter to Proposed Status = Applicable. Look at the Business Line Comparison column. Flag outliers where the rating differs significantly from peers."]
      - ["6. Save your work", "When done, save the workbook. Your filled-in RCO columns (RCO Agrees, Recommended Status, Rating, and Comment) are preserved in the file. If override CSV files are prepared separately and placed in data/input/, the tool will ingest them on the next run and surface your overrides as validated sibling context for other RCOs."]

  - title: "RISK OWNER REVIEW — PRIORITY SCORING"
    tab: "RCO Methodology"
    header: ["Score", "Meaning"]
    rows:
      - ["100", "Tool proposes N/A but signals contradict: application flags, auxiliary risk flags, cross-boundary keyword hits, or a sibling L2 is rated High/Critical. Most likely false negative."]
      - ["90", "Tool could not determine applicability (Applicability Undetermined). RCO input needed."]
      - ["80", "Tool proposes Applicable but with low or medium confidence. Possible false positive."]
      - ["70", "Tool found no evidence (proposed Assumed N/A) and no other signals contradict. Needs verification but lower urgency than contradicted rows."]
      - ["60", "No legacy pillar maps to this L2 (No Legacy Source). Structural gap, needs first-time assessment."]
      - ["50", "Tool proposes Applicable at High or Critical. Likely correct, but review for rating consistency across the portfolio."]
      - ["40", "Tool proposes Applicable at Low or Medium. Lowest urgency among applicable rows."]
      - ["20", "Legacy assessment was N/A, no contradicting signals. Lowest review priority."]
