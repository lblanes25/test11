# Static prose banners shown in the HTML report's per-entity drill-down.
# Edit copy here without touching Python.
# HTML is allowed (e.g., <strong>, <br>); these strings are emitted into
# the rendered HTML verbatim.
#
# Keys must match the lookup keys used in export_html_report.py
# (see _BANNERS dict and _banner_html helper).

source_banners:
  iag:
    style: warn   # banner-warn, banner-info, or banner-ok
    body: |-
      Approved findings drive L2 applicability regardless of status — a closed finding still indicates the L2 was relevant for this entity at some point. Findings still in L1/L2 review workflow do NOT fire an "Issue confirmed" decision. Active statuses (Open, In Validation, In Sustainability) additionally drive Impact of Issues listings and control-contradiction flags; closed findings appear in the Source tab below for traceability but do not contribute to those.

  ore:
    style: info
    body: |-
      ORE events are mapped to L2 risks by spaCy NLP word-vector similarity of event title and description against the L2 taxonomy definitions. Closed and canceled events, and events missing a title or description, are excluded before mapping. All remaining events are shown regardless of mapping status.

  prsa:
    style: info
    body: |-
      PRSA L2 mappings come from one of two sources: (1) the <strong>Risk Level 2</strong> value entered in IRM Archer (preferred), or (2) NLP word-vector similarity of issue text against the L2 taxonomy (used when the IRM Archer Risk Level 2 is blank or does not match the current taxonomy). The <strong>L2 Source</strong> column distinguishes them. All issues are shown regardless of mapping status. PRSA issues flagged with <code>#PG</code> or <code>PG</code> at the start of the Issue Description are surfaced separately in the <strong>Source - PG Gaps</strong> Excel tab.

  gra_rap:
    style: info
    body: |-
      GRA RAPs are mapped to L2 risks by spaCy NLP word-vector similarity of RAP header and details against the L2 taxonomy definitions. All RAPs are shown regardless of mapping status.

  bma:
    style: info
    body: |-
      Reference only. BMA cases are not attributed to L2 risks programmatically — the audit team handles BMA-to-L2 judgment manually. Activities with a planned completion date before July 1, 2025 are not shown.

  issues_events_scope:
    style: info
    body: |-
      <strong>Mappings on this section's sources (OREs, PRSAs, GRA RAPs) drive Impact of Issues listings only — they do NOT confirm L2 applicability.</strong> Attribution is either entered in IRM Archer (PRSA L2 column) or tool-suggested via NLP, not auditor-confirmed. Open IAG findings are the only auto-confirming source for L2 applicability.

  ore_irm:
    style: warn
    body: |
      OREs from the IRM Archer system are listed below. <strong>{ore_irm_count} IRM OREs</strong> are surfaced. There is no reliable per-event status field on this source today, so all events are shown regardless of resolution. <strong>Confirm open status before treating any IRM ORE as evidence in Impact of Issues.</strong>

  ore_irm_entity:
    style: info
    body: |
      ORE IRM events tagged to this AE. See <strong>Source - ORE IRM</strong> in the Excel workbook for the full list.
