# Static prose banners shown in the HTML report's per-entity drill-down.
# Edit copy here without touching Python.
# HTML is allowed (e.g., <strong>, <br>); these strings are emitted into
# the rendered HTML verbatim.
#
# Keys must match the lookup keys used in export_html_report.py
# (see _BANNERS dict and _banner_html helper).

source_banners:
  iag:
    style: warn
    body: |-
      Approved IAG findings only — drafts excluded. Closed findings shown for traceability but excluded from Impact of Issues and contradiction flags.

  ore:
    style: warn
    body: |-
      Active legacy OREs only. Closed and canceled events are excluded. <strong>Starting point only:</strong> items are matched to L2 by NLP text similarity, which can be wrong — e.g. generic wording, or L2 definitions that read similarly. Every item is marked Needs Review by design; confirm you agree with the L2 attribution before relying on it.

  ore_irm:
    style: warn
    body: |-
      All IRM Archer OREs are shown — Capture Status reflects workflow entry, not resolution. Confirm an ORE's status in IRM before treating it as evidence in Impact of Issues. <strong>Starting point only:</strong> NLP-mapped items are matched to L2 by text similarity, which can be wrong — generic wording or similarly-worded L2 definitions. Mapper-derived items are marked Needs Review by design; confirm the L2 attribution before relying on it.

  prsa:
    style: warn
    body: |-
      Active PRSA issues from IRM Archer, attributed to AEs via the PRSA list in Source - Legacy Data. PG-flagged issues are surfaced separately. <strong>Starting point only:</strong> NLP-mapped items are matched to L2 by text similarity, which can be wrong — generic wording or similarly-worded L2 definitions. They are marked Needs Review by design; confirm the L2 attribution before relying on it.

  pg_gap:
    style: info
    body: |-
      PG-flagged issues from IRM Archer (<code>#PG</code> or <code>PG</code> prefix on Issue Description), attributed to AEs via the PRSA list in Source - Legacy Data.

  gra_rap:
    style: warn
    body: |-
      RAPs tagged to this AE. <strong>Starting point only:</strong> items are matched to L2 by NLP text similarity, which can be wrong — e.g. generic wording, or L2 definitions that read similarly. Every item is marked Needs Review by design; confirm you agree with the L2 attribution before relying on it.

  bma:
    style: info
    body: |-
      BMA cases where the audit team has indicated an AERA update is needed, with planned completion on or after July 1, 2025. LUminate does not map BMAs to L2 — the audit team makes that determination.

  key_risks:
    style: info
    body: |-
      Audit team-defined key risks (sub-risks) per AE. Used to drive applicability suggestions; not used to set ratings.

  l2_taxonomy:
    style: info
    body: |-
      The current 24-risk taxonomy used as the canonical reference for L2 attribution across all sources.

  models:
    style: info
    body: |-
      Model inventory entries referenced by at least one AE in <em>Source - Legacy Data</em>. Models not tagged to any AE are not shown.

  legacy_data:
    style: info
    body: |-
      The audit team's current-state input per AE — ratings, apps, third parties, models, mandates, PRSA tagging, and IRM ORE attribution. Drives signal suggestions, not determinations.

  upstream_tagging_gaps:
    style: warn
    body: |-
      Items that cannot be attributed to an AE in this report. Captured here so reviewers can see exactly what dropped out and follow up with the responsible team to fix the upstream tagging gap.

  unmapped_suffix:
    style: warn
    body: |-
      Note: some items for this AE are unmapped to an L2 risk and do not appear in any L2 row. To find them, see the Unmapped Findings column on the Audit_Review tab of the Excel workbook.

  ore_irm_entity:
    style: warn
    body: |
      ORE IRM events tagged to this AE. See <strong>Source - ORE IRM</strong> in the Excel workbook for the full list. <strong>Starting point only:</strong> NLP-mapped items are matched to L2 by text similarity, which can be wrong — generic wording or similarly-worded L2 definitions. Mapper-derived items are marked Needs Review by design; confirm the L2 attribution before relying on it.
