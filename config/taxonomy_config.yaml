# =============================================================================
# Risk Taxonomy Transformer — Reference Configuration
# =============================================================================
# Edit this file to update taxonomy definitions, crosswalk mappings, and
# keyword lists without modifying the Python script.

# -- Cross-boundary scanning --
# Scans all pillar rationale/sub-risks against all L2 keywords, flagging
# hits that fall outside the crosswalk-defined mappings. Informational only.
cross_boundary_scanning:
  enabled: true
  scan_rationale: true
  scan_sub_risks: true
  min_hits_per_pillar: 2  # require at least 2 keyword hits to generate a flag

# -- Thresholds --
high_confidence_threshold: 3  # keyword hits >= this -> "high" confidence
na_strings:
  - "not applicable"
  - "n/a"
  - "na"
  - ""

# -- Legacy rating maps --
risk_rating_map:
  low: 1
  medium: 2
  high: 3
  critical: 4
  l: 1
  m: 2
  h: 3
  c: 4
  "1": 1
  "2": 2
  "3": 3
  "4": 4

control_rating_map:
  well controlled: 1
  moderately controlled: 2
  new/not tested yet: 3
  not tested: 3
  new: 3
  insufficiently controlled: 4
  not applicable: null
  n/a: null

# -- Control Effectiveness Assessment --
# Maps the entity's last engagement rating to a control effectiveness baseline
audit_rating_baseline_map:
  satisfactory: "Well Controlled"
  requires attention: "Moderately Controlled"
  needs improvement: "Inadequately Controlled"
  unsatisfactory: "Poorly Controlled"

# Which ORE statuses to include in control impact
ore_confidence_filter:
  - "Suggested Match"
  - "Needs Review"

