# -- New taxonomy definition --
# 6 L1s / 23 evaluated L2s (Matt 2026-05-01 update).
# Operational and Compliance split into two L1s; Fraud evaluated at L3 grain
# (External Fraud - First Party, External Fraud - Victim Fraud, Internal
# Fraud) instead of the prior two-L2 rollup; several L2 renamed for
# readability. Earnings, Reputation, and Country Risk are in the broader
# 24-risk taxonomy as "Not Assessed" (per slide) — excluded here so they
# don't generate Audit_Review rows.
new_taxonomy:
  Strategic:
    - Capital
  Liquidity:
    - Liquidity
  Market:
    - Interest Rate
    - FX and Price
  Credit:
    - Consumer and Small Business
    - Commercial
  Operational:
    - External Fraud - First Party
    - External Fraud - Victim Fraud
    - Internal Fraud
    - Processing, Execution and Change
    - Human Capital
    - Financial Reporting
    - Business Disruption
    - Data
    - Technology
    - Information and Cyber Security
    - Third Party
    - Model
  Compliance:
    - Customer / client protection and practices
    - Prudential & bank administration compliance
    - Financial crimes
    - Privacy
    - Conduct

# -- L2 alias map --
# Free-text variants -> canonical L2 name. Used when normalizing IAG findings,
# PRSA issues, ORE mapper outputs, sub-risk strings, etc. against the taxonomy.
# Aliases are matched case-insensitively after L1-prefix stripping. Values
# must appear in `new_taxonomy` above (validated at startup).
l2_aliases:
  # Information and Cyber Security
  "infosec": "Information and Cyber Security"
  "info security": "Information and Cyber Security"
  "information security": "Information and Cyber Security"
  "cyber security": "Information and Cyber Security"
  "cybersecurity": "Information and Cyber Security"
  "info and cyber security": "Information and Cyber Security"
  "info & cyber security": "Information and Cyber Security"
  "information and cyber security": "Information and Cyber Security"
  "information security / data protection": "Information and Cyber Security"
  # Prudential & bank administration compliance
  "prudential & bank admin compliance": "Prudential & bank administration compliance"
  "prudential and bank administration compliance": "Prudential & bank administration compliance"
  "prudential & bank admin": "Prudential & bank administration compliance"
  "prudential compliance": "Prudential & bank administration compliance"
  # Customer / client protection and practices
  "customer / client protection": "Customer / client protection and practices"
  "customer/client protection and product compliance": "Customer / client protection and practices"
  "customer / client protection and product compliance": "Customer / client protection and practices"
  "client protection": "Customer / client protection and practices"
  "consumer compliance": "Customer / client protection and practices"
  # Financial crimes
  "financial crime": "Financial crimes"
  # Fraud at L3 grain (Matt 2026-05-01). External Fraud L3 sub-types and
  # Internal Fraud are evaluated as L2-grain entries. Legacy umbrella names
  # ("Fraud", "Fraud (External and Internal)", bare "External Fraud") are
  # intentionally absent — too ambiguous to assign without other evidence.
  "external fraud - first party": "External Fraud - First Party"
  "external fraud - first party fraud": "External Fraud - First Party"
  "external fraud - victim fraud": "External Fraud - Victim Fraud"
  "external fraud - victim third party": "External Fraud - Victim Fraud"
  "external fraud - victim / third party": "External Fraud - Victim Fraud"
  "external fraud - third party": "External Fraud - Victim Fraud"
  "internal fraud": "Internal Fraud"
  "physical security & internal fraud": "Internal Fraud"
  "physical security and internal fraud": "Internal Fraud"
  # Other
  "processing execution and change": "Processing, Execution and Change"
  "processing execution & change": "Processing, Execution and Change"
  "processing, execution & change": "Processing, Execution and Change"
  "processing, execution, and change": "Processing, Execution and Change"
  "fx & price": "FX and Price"
  "fx and price risk": "FX and Price"
  "interest rate risk": "Interest Rate"
  "consumer & small business": "Consumer and Small Business"
  "third-party": "Third Party"
  "people (including conduct & culture": "Conduct"
  "people (including conduct & culture)": "Conduct"

# -- Unmappable L2 strings --
# Values that should resolve to None (no L2 row produced) rather than match.
# Old L1 names appearing in free-text data, "Not Assessed" categories
# (Earnings, Reputation, Country per Matt 2026-04-21), and known noise.
l2_unmappable:
  - "nan"
  - "Country"
  - "Compliance"
  - "Market"
  - "Operational"
  - "Strategic"
  - "Credit"
  - "Reputational"
  - "Reputation"
  - "Liquidity"
  - "Earnings"
  - "Fair Lending / Regulation B"
  - "Operational - Legal"

# -- Crosswalk config --
# Each legacy pillar maps to one or more new L2s.
#
# mapping_type:
#   "direct"  - 1:1 to a single L2
#   "multi"   - 1:many, populates ALL targets (primary, secondary, conditional)
#   "overlay" - amplifier risk, flagged on target L2s
#
# For "multi" targets:
#   "primary"     - always populated with legacy rating, high confidence
#   "secondary"   - always populated, flagged for team review
#   "conditional" - only populated if rationale/sub-risk keywords match
#
# When multiple old L1s map to the same L2, the higher (more conservative)
# rating is kept and both sources are logged for traceability.

crosswalk_config:
  Credit:
    mapping_type: multi
    targets:
      - l2: Consumer and Small Business
        relationship: primary
      - l2: Commercial
        relationship: primary
    notes: Both populate; teams mark the non-applicable one N/A

  Market:
    mapping_type: multi
    targets:
      - l2: Interest Rate
        relationship: primary
      - l2: FX and Price
        relationship: primary
    notes: Both populate; similarly assessed per VP

  Strategic & Business:
    mapping_type: direct
    target_l2: Capital
    notes: Capital has low applicability for most AEs; Earnings L2 removed from evaluation

  Funding & Liquidity:
    mapping_type: direct
    target_l2: Liquidity
    notes: Direct 1:1 mapping

  Model:
    mapping_type: direct
    target_l2: Model
    notes: Direct 1:1 mapping

  Third Party:
    mapping_type: direct
    target_l2: Third Party
    notes: Direct 1:1 mapping

  Financial Reporting:
    mapping_type: direct
    target_l2: Financial Reporting
    notes: Direct 1:1 mapping

  # Legacy External Fraud rating intentionally does NOT carry forward
  # (Matt 2026-05-01) — it cannot be cleanly split between First Party
  # and Victim Fraud. The pillar IS still scored for applicability via
  # keyword evidence on its rationale (see keyword_map). Findings, ORE,
  # PRSA, RAP, and the AI prompt provide additional evidence.
  External Fraud:
    mapping_type: multi
    suppress_rating: true
    targets:
      - l2: External Fraud - First Party
        relationship: primary
      - l2: External Fraud - Victim Fraud
        relationship: primary
    notes: |
      Rating not carried forward; applicability driven by First Party vs
      Victim keyword disambiguation. Generic-only fraud rationale lands
      on the reviewer queue (Applicability Undetermined).

  Information Technology:
    mapping_type: multi
    targets:
      - l2: Technology
        relationship: primary
      - l2: Data
        relationship: primary
    notes: Both always applicable — legacy IT pillar covers technology and data

  Information Security:
    mapping_type: multi
    targets:
      - l2: Information and Cyber Security
        relationship: primary
      - l2: Data
        relationship: primary
    notes: Both always applicable — legacy InfoSec pillar covers cyber and data

  Operational:
    mapping_type: multi
    targets:
      - l2: Processing, Execution and Change
        relationship: primary
      - l2: Business Disruption
        relationship: primary
      - l2: Human Capital
        relationship: primary
      - l2: Conduct
        relationship: secondary
      - l2: Privacy
        relationship: secondary
      - l2: Data
        relationship: conditional
        conditions:
          - data risk
          - data volume
          - data depend
          - data governance
          - data quality
          - data process
      - l2: Internal Fraud
        relationship: conditional
        conditions:
          - internal fraud
          - embezzlement
          - misappropriation
          - kickback
          - falsification
          - unauthorized trading
          - employee fraud
          - collusion
    notes: >-
      Old operational covered operations/process, legal, privacy,
      people/conduct, data. Internal Fraud is conditional — fires when
      legacy Operational rationale contains internal-fraud language.

  Compliance:
    mapping_type: multi
    targets:
      - l2: Prudential & bank administration compliance
        relationship: primary
      - l2: Customer / client protection and practices
        relationship: primary
      - l2: Financial crimes
        relationship: primary
      - l2: Conduct
        relationship: secondary
    notes: >-
      Old compliance covered enterprise, consumer, fair lending,
      new products, global financial crimes

