# -- New taxonomy definition --
# 6 L1s / 23 L2s
new_taxonomy:
  Strategic:
    - Earnings
    - Capital
  Liquidity:
    - Liquidity
  Reputational:
    - Reputation
  Market:
    - Interest Rate
    - FX and Price
  Credit:
    - Consumer and Small Business
    - Commercial
  Operational and Compliance:
    - Data
    - Fraud (External and Internal)
    - Information and Cyber Security
    - Technology
    - Processing, Execution and Change
    - Business Disruption
    - Human Capital
    - Financial Reporting
    - Third Party
    - Model
    - Conduct
    - Prudential & bank administration compliance
    - Customer / client protection and product compliance
    - Financial crimes
    - Privacy

# -- Crosswalk config --
# Each legacy pillar maps to one or more new L2s.
#
# mapping_type:
#   "direct"  - 1:1 to a single L2
#   "multi"   - 1:many, populates ALL targets (primary, secondary, conditional)
#   "overlay" - amplifier risk, flagged on target L2s
#
# For "multi" targets:
#   "primary"     - always populated with legacy rating, high confidence
#   "secondary"   - always populated, flagged for team review
#   "conditional" - only populated if rationale/sub-risk keywords match
#
# When multiple old L1s map to the same L2, the higher (more conservative)
# rating is kept and both sources are logged for traceability.

crosswalk_config:
  Credit:
    mapping_type: multi
    targets:
      - l2: Consumer and Small Business
        relationship: primary
      - l2: Commercial
        relationship: primary
    notes: Both populate; teams mark the non-applicable one N/A

  Market:
    mapping_type: multi
    targets:
      - l2: Interest Rate
        relationship: primary
      - l2: FX and Price
        relationship: primary
    notes: Both populate; similarly assessed per VP

  Strategic & Business:
    mapping_type: multi
    targets:
      - l2: Earnings
        relationship: primary
      - l2: Capital
        relationship: secondary
    notes: Capital has low applicability for most AEs

  Funding & Liquidity:
    mapping_type: direct
    target_l2: Liquidity
    notes: Direct 1:1 mapping

  Reputational:
    mapping_type: direct
    target_l2: Reputation
    notes: Direct 1:1 mapping

  Model:
    mapping_type: direct
    target_l2: Model
    notes: Direct 1:1 mapping

  Third Party:
    mapping_type: direct
    target_l2: Third Party
    notes: Direct 1:1 mapping

  Financial Reporting:
    mapping_type: direct
    target_l2: Financial Reporting
    notes: Direct 1:1 mapping

  External Fraud:
    mapping_type: direct
    target_l2: Fraud (External and Internal)
    notes: Direct 1:1 mapping

  Information Technology:
    mapping_type: multi
    targets:
      - l2: Technology
        relationship: primary
      - l2: Data
        relationship: primary
    notes: Both always applicable — legacy IT pillar covers technology and data

  Information Security:
    mapping_type: multi
    targets:
      - l2: Information and Cyber Security
        relationship: primary
      - l2: Data
        relationship: primary
    notes: Both always applicable — legacy InfoSec pillar covers cyber and data

  Operational:
    mapping_type: multi
    targets:
      - l2: Processing, Execution and Change
        relationship: primary
      - l2: Business Disruption
        relationship: primary
      - l2: Human Capital
        relationship: primary
      - l2: Conduct
        relationship: secondary
      - l2: Privacy
        relationship: secondary
      - l2: Data
        relationship: conditional
        conditions:
          - data risk
          - data volume
          - data depend
          - data governance
          - data quality
          - data process
    notes: >-
      Old operational covered operations/process, legal, privacy,
      people/conduct, data. Largest split.

  Compliance:
    mapping_type: multi
    targets:
      - l2: Prudential & bank administration compliance
        relationship: primary
      - l2: Customer / client protection and product compliance
        relationship: primary
      - l2: Financial crimes
        relationship: primary
      - l2: Conduct
        relationship: secondary
    notes: >-
      Old compliance covered enterprise, consumer, fair lending,
      new products, global financial crimes

  Country:
    mapping_type: overlay
    target_l2s:
      - Prudential & bank administration compliance
      - Financial crimes
      - Consumer and Small Business
      - Commercial
    notes: Amplifier - flags relevant L2s, does not create own row

