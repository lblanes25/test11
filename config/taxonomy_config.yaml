# =============================================================================
# Risk Taxonomy Transformer — Reference Configuration
# =============================================================================
# Edit this file to update taxonomy definitions, crosswalk mappings, and
# keyword lists without modifying the Python script.

# -- Cross-boundary scanning --
# Scans all pillar rationale/sub-risks against all L2 keywords, flagging
# hits that fall outside the crosswalk-defined mappings. Informational only.
cross_boundary_scanning:
  enabled: true
  scan_rationale: true
  scan_sub_risks: true
  min_hits_per_pillar: 2  # require at least 2 keyword hits to generate a flag

# -- Thresholds --
high_confidence_threshold: 3  # keyword hits >= this -> "high" confidence
na_strings:
  - "not applicable"
  - "n/a"
  - "na"
  - ""

# -- Legacy rating maps --
risk_rating_map:
  low: 1
  medium: 2
  high: 3
  critical: 4
  l: 1
  m: 2
  h: 3
  c: 4
  "1": 1
  "2": 2
  "3": 3
  "4": 4

control_rating_map:
  well controlled: 1
  moderately controlled: 2
  new/not tested yet: 3
  not tested: 3
  new: 3
  insufficiently controlled: 4
  not applicable: null
  n/a: null
  # New baseline terminology (Matt 2026-04-21). Satisfactory = effective,
  # Partially Effective = middle (covers both Requires Attention and Needs
  # Improvement legacy report ratings), Ineffective = poor.
  satisfactory: 1
  partially effective: 2
  ineffective: 3

# -- Control Effectiveness Assessment --
# Maps the entity's last engagement rating to a control effectiveness baseline.
# 2026-04-21: Matt's updated guidance collapses Requires Attention + Needs
# Improvement into a single "Partially Effective" baseline (amendable via
# issue/event inputs — see Slide 3 flow, Phase 2).
audit_rating_baseline_map:
  satisfactory: "Satisfactory"
  requires attention: "Partially Effective"
  needs improvement: "Partially Effective"
  unsatisfactory: "Ineffective"

# Mapper status filters — only "Suggested Match" rows feed control impact.
# "Needs Review" is filtered out because the band label is not currently
# rendered in Audit_Review or the HTML report, so reviewers cannot tell a
# confident match from an ambiguous one. Revisit if/when the band becomes
# visible to readers.
ore_confidence_filter:
  - "Suggested Match"
prsa_confidence_filter:
  - "Suggested Match"
rap_confidence_filter:
  - "Suggested Match"

